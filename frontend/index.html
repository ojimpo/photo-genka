<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta property="og:title" content="photo-genka — x-e5.ojimpo.com">
<meta property="og:description" content="X-E5の写真1枚あたりの値段が見れるだけのWEBアプリ">
<meta property="og:type" content="website">
<title>photo-genka — x-e5.ojimpo.com</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<header class="lockup">
  <p class="owner">OJIMPO'S</p>
  <h1>FUJIFILM X-E5</h1>
  <p class="since" id="since">SINCE 2026</p>
  <p class="site">photo-genka ・ x-e5.ojimpo.com</p>
</header>

<p id="mock-badge" hidden>⚠ Immich 未接続 — 仮データ表示中</p>

<!-- ① ヒーロー: X-E5イラスト＋現在単価 -->
<section class="hero">
  <div class="camera">
    <img src="x-e5.png?v=2" alt="シルバーのX-E5 + XF23mmF2.8" width="660" height="363">
    <!-- 演出オーバーレイ: 実写の上にキラキラ（時間減衰）とアタリ（枚数出現）を重ねる -->
    <svg class="overlay" viewBox="0 0 320 177" aria-hidden="true">
      <defs>
        <!-- 4条スパークル（中心原点）。g で位置決めし、use 側を CSS でまたたかせる -->
        <path id="star4" d="M0 -10 C0.9 -4 4 -0.9 10 0 C4 0.9 0.9 4 0 10 C-0.9 4 -4 0.9 -10 0 C-4 -0.9 -0.9 -4 0 -10 Z"/>
      </defs>
      <g id="sparkle" opacity="0">
        <g transform="translate(292,20)"><use href="#star4" class="tw" fill="#C9A227" style="--t:2.6s;--d:0s"/></g>
        <g transform="translate(30,30) scale(0.65)"><use href="#star4" class="tw" fill="#E4C766" style="--t:3.2s;--d:.7s"/></g>
        <g transform="translate(258,120) scale(0.5)"><use href="#star4" class="tw" fill="#FFF3CE" style="--t:2.2s;--d:1.3s"/></g>
        <g transform="translate(70,14) scale(0.45)"><use href="#star4" class="tw" fill="#FFF3CE" style="--t:2.9s;--d:.3s"/></g>
        <g transform="translate(160,8) scale(0.8)"><use href="#star4" class="tw" fill="#C9A227" style="--t:3.6s;--d:1.8s"/></g>
        <g transform="translate(14,120) scale(0.55)"><use href="#star4" class="tw" fill="#E4C766" style="--t:2.4s;--d:2.2s"/></g>
        <g transform="translate(306,74) scale(0.4)"><use href="#star4" class="tw" fill="#FFF3CE" style="--t:2.0s;--d:.9s"/></g>
        <g transform="translate(120,166) scale(0.6)"><use href="#star4" class="tw" fill="#C9A227" style="--t:3.0s;--d:1.1s"/></g>
      </g>
      <!-- アタリレイヤー: 本体の角に沿った塗装剥げ。将来インペインティング素材に差し替え -->
      <g class="wear" data-level="1" opacity="0"><path d="M22 48 q2 -10 12 -12" fill="none" stroke="#EDEAE3" stroke-width="2" stroke-linecap="round" opacity="0.8"/></g>
      <g class="wear" data-level="2" opacity="0"><path d="M298 48 q-2 -10 -12 -12" fill="none" stroke="#EDEAE3" stroke-width="2" stroke-linecap="round" opacity="0.8"/></g>
      <g class="wear" data-level="3" opacity="0"><path d="M24 156 q2 8 12 10" fill="none" stroke="#C9BC8E" stroke-width="2" stroke-linecap="round" opacity="0.8"/></g>
      <g class="wear" data-level="4" opacity="0"><path d="M296 156 q-2 8 -12 10" fill="none" stroke="#C9BC8E" stroke-width="2" stroke-linecap="round" opacity="0.8"/></g>
      <g class="wear" data-level="5" opacity="0"><rect x="140" y="34" width="40" height="2.5" rx="1.25" fill="#C9BC8E" opacity="0.8"/></g>
    </svg>
  </div>
  <p class="atari-note" id="atari-note"></p>
  <div class="ownership">
    <div class="bar"><div class="fill" id="installment-fill"></div></div>
    <p id="installment-label"></p>
  </div>
  <p class="label">いま、1枚あたり</p>
  <div class="counter"><span id="price">—</span><small>/枚</small></div>
  <p class="breakdown"><span id="breakdown"></span>　<span class="delta" id="delta"></span></p>
</section>

<!-- ② 数字カード -->
<section class="cards">
  <div class="card">
    <p>撮影枚数（ImageCount）</p>
    <strong id="count">—</strong>
    <p class="trivia" id="trivia"></p>
  </div>
  <div class="card">
    <p>フィルム1本（<span id="roll-shots">24</span>枚）換算</p>
    <strong id="film-roll-price">—</strong>
    <svg class="patrone" viewBox="0 0 60 40" aria-label="フジカラー風パトローネのイラスト">
      <!-- フィルム舌先 -->
      <rect x="38" y="13" width="10" height="14" fill="#1B1A18"/>
      <rect x="46" y="17" width="8" height="6" rx="1" fill="#4A4844"/>
      <!-- 本体（フジカラー緑） -->
      <rect x="12" y="6" width="28" height="28" rx="2.5" fill="#00654E"/>
      <!-- 白ラベル帯 -->
      <rect x="12" y="12" width="28" height="12" fill="#F4F2EC"/>
      <rect x="15" y="15" width="16" height="3" rx="1.5" fill="#00654E"/>
      <rect x="15" y="20" width="9" height="2" rx="1" fill="#C0322B"/>
      <circle cx="35" cy="18" r="3" fill="#C0322B"/>
      <!-- 上下キャップとスプール軸 -->
      <rect x="10" y="3" width="32" height="4" rx="2" fill="#23221F"/>
      <rect x="10" y="33" width="32" height="4" rx="2" fill="#23221F"/>
      <rect x="22" y="0" width="8" height="4" rx="1" fill="#4A4844"/>
    </svg>
  </div>
  <div class="card">
    <p>フィルム比</p>
    <strong class="good" id="film-ratio">—</strong>
    <p class="trivia" id="film-note"></p>
  </div>
</section>

<!-- ③ 単価×時系列グラフ -->
<section class="chart">
  <svg id="chart-svg" viewBox="0 0 440 180" role="img" aria-label="1枚あたり価格の推移グラフ"></svg>
  <p class="toggle" id="scale-toggle">対数スケール ⇄</p>
</section>

<!-- ④ ドロップゾーン -->
<section class="drop" id="drop">
  <b>写真をドロップ / タップして選択</b>
  <span id="drop-msg">「何枚目」と「撮影時点の単価」がわかります（画像は保存されません）</span>
  <input type="file" id="file-input" accept=".jpg,.jpeg,.heic,.heif,.hif,.raf,image/*" hidden>
  <div class="drop-result" id="drop-result" hidden></div>
</section>

<script src="app.js?v=3"></script>
</body>
</html>
