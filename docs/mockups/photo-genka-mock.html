<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>photo-genka — レイアウトモック</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #E9E7E2;          /* 18%グレー由来の暖色シルバー */
    --card: #F7F6F3;
    --ink: #2B2A28;
    --ink-sub: #6E6C66;
    --line: #D6D3CC;
    --green: #3E6B4F;       /* 単価曲線・お得表示 */
    --amber: #B97A1B;       /* フィルム基準線 */
    --counter-bg: #23221F;  /* フレームカウンター窓 */
    --counter-fg: #F2EFE8;
    --num: "Barlow Semi Condensed", sans-serif;
    --jp: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
  }
  * { margin: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--ink); font-family: var(--jp);
    max-width: 480px; margin: 0 auto; padding: 20px 16px 48px;
    font-size: 14px; line-height: 1.6;
  }
  header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
  header h1 { font-family: var(--num); font-size: 15px; font-weight: 600; letter-spacing: 0.12em; }
  header span { font-size: 11px; color: var(--ink-sub); }

  /* ① ヒーロー */
  .hero { text-align: center; }
  .hero .camera { position: relative; width: 220px; margin: 0 auto; }
  .hero .camera svg { width: 100%; display: block; }
  .hero .atari-note { font-size: 11px; color: var(--ink-sub); margin-top: 2px; }
  .hero .label { font-size: 12px; color: var(--ink-sub); margin-top: 18px; }
  .hero .counter {
    display: inline-block; background: var(--counter-bg); color: var(--counter-fg);
    font-family: var(--num); font-weight: 600; font-size: 52px; line-height: 1;
    padding: 10px 22px 12px; border-radius: 10px; margin-top: 6px;
    font-variant-numeric: tabular-nums; letter-spacing: 0.02em;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.45);
  }
  .hero .counter small { font-size: 20px; font-weight: 500; margin-left: 4px; color: #B9B5AA; }
  .hero .breakdown { font-size: 12px; color: var(--ink-sub); margin-top: 10px; }
  .hero .breakdown .delta { color: var(--green); }

  /* ② 数字カード */
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 24px 0; }
  @media (max-width: 380px) { .cards { grid-template-columns: 1fr 1fr; } }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; }
  .card p { font-size: 10.5px; color: var(--ink-sub); }
  .card strong { font-family: var(--num); font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .card strong.good { color: var(--green); }

  /* ③ グラフ */
  .chart { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 14px 10px 8px; }
  .chart svg { width: 100%; display: block; }
  .chart .toggle { text-align: right; font-size: 10.5px; color: var(--ink-sub); padding: 4px 6px 2px; }

  /* ④ ドロップゾーン */
  .drop {
    border: 1.5px dashed var(--line); border-radius: 10px; text-align: center;
    padding: 20px 16px; margin-top: 16px; color: var(--ink-sub); font-size: 12.5px;
  }
  .drop b { display: block; font-size: 13px; color: var(--ink); font-weight: 600; margin-bottom: 2px; }
</style>
</head>
<body>

<header>
  <h1>PHOTO-GENKA</h1>
  <span>x-e5.ojimpo.com</span>
</header>

<!-- ① ヒーロー: X-E5イラスト＋現在単価 -->
<section class="hero">
  <div class="camera">
    <svg viewBox="0 0 220 130" role="img" aria-label="X-E5のイラスト。新品のキラキラが重なっている">
      <rect x="25" y="38" width="170" height="78" rx="8" fill="#DDDAD2" stroke="#8F8C84" stroke-width="1.5"/>
      <rect x="25" y="38" width="170" height="20" rx="8" fill="#3A3936"/>
      <rect x="160" y="30" width="22" height="10" rx="2" fill="#3A3936"/>
      <circle cx="110" cy="82" r="27" fill="#2E2D2A"/>
      <circle cx="110" cy="82" r="17" fill="#4A4844"/>
      <circle cx="110" cy="82" r="7" fill="#1B1A18"/>
      <circle cx="45" cy="48" r="5" fill="#23221F" stroke="#8F8C84"/>
      <!-- キラキラレイヤー: 経過日数/365 で opacity を 1→0 に -->
      <g fill="#C9A227" class="sparkle" opacity="0.85">
        <path d="M192 22 l3.5 8 8 3.5 -8 3.5 -3.5 8 -3.5-8 -8-3.5 8-3.5z"/>
        <path d="M22 20 l2.5 6 6 2.5 -6 2.5 -2.5 6 -2.5-6 -6-2.5 6-2.5z"/>
        <path d="M204 78 l2 4.5 4.5 2 -4.5 2 -2 4.5 -2-4.5 -4.5-2 4.5-2z"/>
      </g>
      <!-- アタリレイヤー: 枚数マイルストーンで opacity 0→1（角の塗装剥げ表現） -->
      <g class="wear" opacity="0">
        <path d="M25 46 q2 -8 10 -8" fill="none" stroke="#B8B4AA" stroke-width="2.5"/>
      </g>
    </svg>
  </div>
  <p class="atari-note">次のアタリまで 1,658枚</p>
  <p class="label">いま、1枚あたり</p>
  <div class="counter">¥29.7<small>/枚</small></div>
  <p class="breakdown">¥248,000 ÷ 8,342枚　<span class="delta">↓ 前日比 −¥0.4</span></p>
</section>

<!-- ② 数字カード -->
<section class="cards">
  <div class="card"><p>撮影枚数（ImageCount）</p><strong>8,342枚</strong></div>
  <div class="card"><p>フィルム1本（24枚）換算</p><strong>¥713</strong></div>
  <div class="card"><p>フィルム比</p><strong class="good">3.2倍お得</strong></div>
</section>

<!-- ③ 単価×時系列グラフ -->
<section class="chart">
  <svg viewBox="0 0 440 180" role="img" aria-label="1枚あたり価格の推移グラフ">
    <line x1="40" y1="145" x2="430" y2="145" stroke="#C9C5BC" stroke-width="1"/>
    <line x1="40" y1="15"  x2="40"  y2="145" stroke="#C9C5BC" stroke-width="1"/>
    <line x1="40" y1="92" x2="430" y2="92" stroke="#B97A1B" stroke-width="1" stroke-dasharray="5 4"/>
    <text x="426" y="86" text-anchor="end" font-size="10" fill="#B97A1B" font-family="sans-serif">フィルム単価 ¥95.8/枚</text>
    <path d="M48 20 C 70 55, 95 80, 130 100 S 240 125, 330 131 S 405 135, 420 136" fill="none" stroke="#3E6B4F" stroke-width="2"/>
    <circle cx="118" cy="92" r="4" fill="#3E6B4F"/>
    <text x="126" y="78" font-size="10" fill="#6E6C66" font-family="sans-serif">3/14 フィルム超え</text>
    <circle cx="420" cy="136" r="4" fill="#3E6B4F"/>
    <text x="414" y="126" text-anchor="end" font-size="10" fill="#2B2A28" font-family="sans-serif">¥29.7</text>
    <text x="35" y="24" text-anchor="end" font-size="10" fill="#8F8C84" font-family="sans-serif">¥300</text>
    <text x="35" y="149" text-anchor="end" font-size="10" fill="#8F8C84" font-family="sans-serif">¥0</text>
    <text x="48" y="162" font-size="10" fill="#8F8C84" font-family="sans-serif">2月（購入）</text>
    <text x="420" y="162" text-anchor="end" font-size="10" fill="#8F8C84" font-family="sans-serif">今日</text>
  </svg>
  <p class="toggle">対数スケール ⇄</p>
</section>

<!-- ④ ドロップゾーン -->
<section class="drop">
  <b>写真をドロップ / タップして選択</b>
  「何枚目」と「撮影時点の単価」がわかります（画像は保存されません）
</section>

</body>
</html>
